name: Build, Scan & Push Docker image

on:
  push:
    branches: [ "main" ]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Get Short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ secrets.DOCKERHUB_USERNAME }}/tsd-tutorial:dmitrii-${{ env.SHORT_SHA }}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Docker/Dockerfile
          load: true # CRITICAL: This keeps the image in the runner so Trivy can scan it
          tags: ${{ env.IMAGE_TAG }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '0' # The base image has some known CVEs. That's why we do not want to fail the pipeline - just paste the info in a table.
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Docker/Dockerfile
          push: true # Now we actually push it!
          tags: ${{ env.IMAGE_TAG }}
